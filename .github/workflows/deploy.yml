name: Deploy Sales Quest

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sales-quest:latest

      # ─── DEPLOY ───
      # Abaixo está um exemplo genérico usando SSH para atualizar a VPS.
      # Se usar Render, Heroku ou Railway, existem actions específicas.
      
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sales-quest:latest
            docker stop sales-quest || true
            docker rm sales-quest || true
            # Monta um volume para o banco de dados e para a pasta de uploads (fotos)
            docker run -d \
              --name sales-quest \
              -p 80:8000 \
              -v /var/sales-quest-data/sales_quest.db:/project/app/sales_quest.db \
              -v /var/sales-quest-data/uploads:/project/app/static/uploads \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/sales-quest:latest
