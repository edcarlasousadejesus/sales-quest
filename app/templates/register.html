<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sales Quest</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-hero">
            <div class="auth-hero-content">
                <div class="auth-hero-logo">🏆</div>
                <h1>Comece sua Jornada</h1>
                <p>Junte-se à nossa equipe, alcance o nível Mestre de Vendas e domine o ranking!</p>
            </div>
        </div>
        <div class="auth-form-container">
            <div class="auth-form-box">
                <h2>Criar Conta</h2>
                <p class="subtitle">Cadastre-se gratuitamente hoje mesmo.</p>
                <form id="registerForm" onsubmit="auth.register(event)">
                    <div class="form-group">
                        <label for="nome">Nome Completo</label>
                        <div class="input-wrapper">
                            <i class='bx bx-user input-icon'></i>
                            <input type="text" id="nome" class="form-input" placeholder="João da Silva" required minlength="2">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <div class="input-wrapper">
                            <i class='bx bx-envelope input-icon'></i>
                            <input type="email" id="email" class="form-input" placeholder="seu@email.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <div class="input-wrapper">
                            <i class='bx bx-lock-alt input-icon'></i>
                            <input type="password" id="senha" class="form-input" placeholder="Crie uma senha forte" required minlength="4">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-accent btn-full mt-2" id="registerBtn">
                        <i class='bx bx-user-plus'></i> Cadastrar
                    </button>
                </form>
                <div class="text-center mt-2">
                    <p class="text-secondary" style="font-size: 0.9rem;">
                        Já tem uma conta? <a href="/login">Faça Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
   {% include 'toast.html' %}
    <script src="/static/js/app.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        if (app.isAuthenticated()) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
