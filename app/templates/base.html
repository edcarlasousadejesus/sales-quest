<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sales Quest{% endblock %}</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Icons (Boxicons) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="app-layout">
        {% include 'sidebar.html' %}
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% include 'toast.html' %}
    <!-- Level Up Overlay -->
    <div class="levelup-overlay" id="levelUpOverlay">
        <div class="levelup-content">
            <div class="levelup-icon">⭐</div>
            <div class="levelup-text" id="levelUpText">Level Up!</div>
            <div class="levelup-subtitle" id="levelUpSubtitle">Você alcançou o Nível 2</div>
        </div>
    </div>
    <!-- Core App Logic -->
  <script src="/static/js/app.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/gamification.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
